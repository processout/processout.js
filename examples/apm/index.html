<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>ProcessOut.js Native APM</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div>
  <form id="initialise-apm">
    <input type="text" id="project-id" name="project_id" placeholder="Project ID" />
    <select name="gateway" id="apm-gateway">
      <option value="">Select Gateway</option>
    </select>
    <select id="flow-type" name="flow_type">
      <option value="pay">Pay</option>
      <option value="pay-with-token">Pay with token</option>
      <option value="tokenize">Tokenize</option>
      <option value="buy-and-tokenize">Buy &amp; Tokenize</option>
    </select>
    <input type="text" id="invoice-id" name="invoice_id" placeholder="Invoice ID" />
    <input type="text" id="customer-id" name="customer_id" placeholder="Customer ID" style="display: none" />
    <input type="text" id="customer-token-id" name="customer_token_id" placeholder="Customer Token ID" style="display: none" />
    <button type="submit">Initialise APM</button>
  </form>
  <fieldset id="redirect-fieldset" style="margin-top: 1rem; max-width: 520px;">
    <legend>Web redirect (headless)</legend>
    <p style="margin: 0 0 0.5rem 0; font-size: 0.9rem; color: #555;">
      Matches <code>FlowData.redirect</code> in the SDK: auto-open PSP, optional silent errors, loader, and where the action overlay attaches.
    </p>
    <div style="display: flex; flex-direction: column; gap: 0.35rem;">
      <label><input type="checkbox" id="redirect-headless" /> Enable headless mode (skip &ldquo;Continue to payment&rdquo; / Pay; open PSP immediately)</label>
      <label style="margin-left: 1.25rem;"><input type="checkbox" id="redirect-silent-failure" disabled /> Silent failure view (headless: no in-widget error; listen for <code>failure</code>)</label>
      <label style="margin-left: 1.25rem;"><input type="checkbox" id="redirect-show-loader" checked disabled /> Show headless loader while opening PSP</label>
      <label style="margin-left: 1.25rem;"><input type="checkbox" id="redirect-popup-blocked-overlay" checked disabled /> SDK overlay on popup-blocked (default <code>true</code>; uncheck to suppress and handle <code>redirect-popup-blocked</code> yourself)</label>
      <label><input type="checkbox" id="redirect-overlay-root" /> Mount PSP action overlay on <code>#action-overlay-root</code> instead of <code>document.body</code></label>
    </div>
  </fieldset>
</div>
<div id="action-overlay-root" title="PSP action overlay mounts here when the option above is enabled"></div>
<div id="apm-container"></div>
<script src="../../dist/processout.js" crossorigin="anonymous"></script>
<script>
  function populateGatewaySelect(gateways) {
    const select = document.getElementById('apm-gateway');
    gateways
      .sort((a, b) => a.name.localeCompare(b.name))
      .forEach(gateway => {
        const option = document.createElement('option');
        option.value = gateway.value;
        option.textContent = gateway.name;
        select.appendChild(option);
      });
  }

  function initConfigs(file) {
    return fetch(file)
      .then(response => response.json())
      .then(data => {
        document.getElementById('project-id').value = data.project_id;
        populateGatewaySelect(data.gateways);
      })
  }

  function initProcessOut() {
    const projectId = document.getElementById('project-id').value;
    const gatewayEl = document.querySelector('#apm-gateway');

    // Build gateway dictionary from select options
    const gatewayDict = {};

    Array.from(gatewayEl.options).forEach(option => {
      gatewayDict[option.value] = option.textContent.trim();
    });

    const flowTypeEl = document.querySelector('#flow-type');
    const invoiceIdEl = document.querySelector('#invoice-id');
    const customerIdEl = document.querySelector('#customer-id');
    const customerTokenIdEl = document.querySelector('#customer-token-id');

    let previousId;
    let previousGateway;

    const client = new ProcessOut.ProcessOut(projectId)
    const el = document.querySelector('#apm-container')

    function syncRedirectDependentControls() {
      const headless = document.getElementById('redirect-headless').checked;
      document.getElementById('redirect-silent-failure').disabled = !headless;
      document.getElementById('redirect-show-loader').disabled = !headless;
      document.getElementById('redirect-popup-blocked-overlay').disabled = !headless;
      if (!headless) {
        document.getElementById('redirect-silent-failure').checked = false;
        document.getElementById('redirect-show-loader').checked = true;
        document.getElementById('redirect-popup-blocked-overlay').checked = true;
      }
    }

    document.getElementById('redirect-headless').addEventListener('change', syncRedirectDependentControls);
    syncRedirectDependentControls();

    function buildRedirectOptions() {
      /** @type {Record<string, unknown>} */
      const redirect = {};
      if (document.getElementById('redirect-headless').checked) {
        redirect.enableHeadlessMode = true;
      }
      if (document.getElementById('redirect-silent-failure').checked) {
        redirect.silentFailureView = true;
      }
      if (document.getElementById('redirect-headless').checked && !document.getElementById('redirect-show-loader').checked) {
        redirect.showHeadlessLoader = false;
      }
      if (document.getElementById('redirect-headless').checked && !document.getElementById('redirect-popup-blocked-overlay').checked) {
        redirect.popupBlockedOverlay = false;
      }
      if (document.getElementById('redirect-overlay-root').checked) {
        redirect.actionOverlayMountParent = document.getElementById('action-overlay-root');
      }
      return Object.keys(redirect).length ? { redirect } : {};
    }

    function syncInputVisibility() {
      const ft = flowTypeEl.value;
      invoiceIdEl.style.display =
        (ft === 'pay' || ft === 'pay-with-token' || ft === 'buy-and-tokenize') ? 'inline-block' : 'none';
      customerIdEl.style.display =
        (ft === 'tokenize' || ft === 'buy-and-tokenize') ? 'inline-block' : 'none';
      customerTokenIdEl.style.display =
        (ft === 'pay-with-token' || ft === 'tokenize' || ft === 'buy-and-tokenize') ? 'inline-block' : 'none';
    }

    flowTypeEl.addEventListener('change', syncInputVisibility);
    syncInputVisibility();

    document.querySelector('#initialise-apm').addEventListener('submit', (e) => {
      e.preventDefault()
      const gatewayConfigurationId = gatewayEl.value.split(':')[0]
      const invoiceId = invoiceIdEl.value
      const customerId = customerIdEl.value
      const customerTokenId = customerTokenIdEl.value

      let apm;

      const flowType = flowTypeEl.value;
      const needsInvoice     = flowType === 'pay' || flowType === 'pay-with-token' || flowType === 'buy-and-tokenize';
      const needsCustomer    = flowType === 'tokenize' || flowType === 'buy-and-tokenize';
      const needsCustomToken = flowType === 'pay-with-token' || flowType === 'tokenize' || flowType === 'buy-and-tokenize';
      const useAuth          = flowType !== 'tokenize';
      const useToken         = flowType === 'tokenize';

      if (needsInvoice) {
        if (!invoiceId) {
          alert('Please enter an invoice ID')
          return;
        }

        if (invoiceId.length !== 35 || invoiceId.slice(0, 3) !== 'iv_') {
          alert('Please enter a valid invoice ID')
          return
        }

        if (previousGateway !== gatewayConfigurationId && previousId === invoiceId) {
          alert(`This invoice id is attached to ${gatewayDict[previousGateway]} and cannot be used with ${gatewayDict[gatewayConfigurationId]}.`)
          return
        }

        if (previousId === invoiceId) {
          const result = confirm("You're using an invoice id that has already been used. Are you sure you want to use it again?")
          if (!result) {
            return
          }
        }

        previousId = invoiceId;
        previousGateway = gatewayConfigurationId;
      }

      if (needsCustomer && !customerId) {
        alert('Please enter a customer ID')
        return
      }

      if (needsCustomToken && !customerTokenId) {
        alert('Please enter a customer token ID')
        return
      }

      if (useAuth) {
        apm = client.apm.authorization(el, {
          gatewayConfigurationId,
          invoiceId,
          customerTokenId: customerTokenId || undefined,
          confirmation: {
            requiresAction: true,
          },
          success: {
            requiresAction: true,
            manualDismissDuration: 0,
          },
          ...buildRedirectOptions(),
        })
      } else if (useToken) {
        apm = client.apm.tokenization(el, {
          gatewayConfigurationId,
          customerId,
          customerTokenId,
          ...buildRedirectOptions(),
        })
      }

      if (apm) {
        apm.on('*', ({ type, ...rest }) => {
          console.log(Date.now(), `apm event - ${type}`, rest)
          if (type === 'success' || type === 'failure' || type === 'payment-cancelled') {
            apm.cleanUp()
          }
        })

        // redirect-popup-blocked fires when the headless auto-open was blocked by the browser
        // (e.g. Safari). By default the SDK shows its own Pay button overlay automatically.
        // When popupBlockedOverlay: false is set, handle it here instead.
        apm.on('redirect-popup-blocked', function (data) {
          if (document.getElementById('redirect-popup-blocked-overlay').checked) return; // SDK overlay or forceUpdate is handling it
          // Example custom UI: a simple fixed overlay with a retry button
          var overlay = document.createElement('div');
          overlay.style.cssText = 'position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,0.5);';
          var btn = document.createElement('button');
          btn.textContent = 'Continue to payment';
          btn.style.cssText = 'padding:0.75em 1.5em;font-size:1rem;cursor:pointer;';
          btn.onclick = function () {
            overlay.remove();
            data.retry();
          };
          overlay.appendChild(btn);
          document.body.appendChild(overlay);
        })

        try {
          apm.initialise()
        } catch (e) {
          console.log('apm catch', e)
          apm.cleanUp()
        }
      }
    })
  }


  document.addEventListener("DOMContentLoaded", function () {
    initConfigs('config.json')
      .catch(error => {
        console.error('Error loading gateways:', error);
        return initConfigs('config-example.json');
      })
      .then(it => initProcessOut());
  })
</script>
</body>
</html>
